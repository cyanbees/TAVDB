<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavDB API Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 0;
}
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 320px; min-width: 320px; background: #161b22;
  border-right: 1px solid #30363d; display: flex; flex-direction: column;
  height: 100vh; position: sticky; top: 0; overflow-y: auto;
}
.sidebar-header { padding: 20px; border-bottom: 1px solid #30363d; }
.sidebar-header h1 { font-size: 20px; color: #58a6ff; }
.sidebar-header p { font-size: 12px; color: #8b949e; margin-top: 4px; }
.sidebar-section { padding: 10px 12px; }
.sidebar-section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
  color: #8b949e; font-weight: 600; margin-bottom: 6px; padding-left: 4px;
}
.endpoint-list { list-style: none; display: flex; flex-direction: column; gap: 1px; }
.endpoint-btn {
  display: block; width: 100%; text-align: left; padding: 7px 10px;
  background: transparent; border: none; border-radius: 6px;
  color: #c9d1d9; font-size: 12px; cursor: pointer; transition: all .15s;
  font-family: 'SF Mono', 'Consolas', monospace; line-height: 1.4;
}
.endpoint-btn:hover { background: #21262d; color: #58a6ff; }
.endpoint-btn.active { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
.endpoint-btn .method { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; }
.endpoint-btn .method.get { background: #23863622; color: #3fb950; }
.endpoint-btn .path { font-size: 11px; }
.endpoint-btn .desc { display: block; font-size: 10px; color: #8b949e; font-family: -apple-system, sans-serif; margin-top: 1px; }
.badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; margin-left: 3px; vertical-align: middle; }
.badge.auth { background: #d2992222; color: #d29922; border: 1px solid #d2992244; }
.badge.pub { background: #23863622; color: #3fb950; border: 1px solid #23863644; }

/* Main */
.main { flex: 1; padding: 24px 28px; overflow-y: auto; max-height: 100vh; }

/* Login bar */
.login-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 12px 18px; background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; margin-bottom: 18px;
}
.login-bar .label { font-size: 13px; color: #8b949e; font-weight: 500; }
.login-bar input {
  padding: 7px 11px; background: #0d1117; border: 1px solid #30363d;
  border-radius: 6px; color: #e6edf3; font-size: 13px; outline: none; width: 150px;
}
.login-bar input:focus { border-color: #58a6ff; }
.login-bar .status { font-size: 12px; display: flex; align-items: center; gap: 6px; }

.btn {
  padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn-primary { background: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-primary:disabled { background: #1a5a2c; opacity: .5; cursor: not-allowed; }
.btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
.btn-secondary:hover { background: #30363d; }
.btn-danger { background: #da3633; color: #fff; }
.btn-danger:hover { background: #f85149; }

/* Endpoint detail */
.endpoint-detail { display: none; }
.endpoint-detail.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.detail-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden;
}
.detail-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid #30363d;
}
.detail-path { font-family: 'SF Mono', monospace; font-size: 15px; font-weight: 600; }
.detail-title { font-size: 13px; color: #8b949e; }
.detail-body { padding: 20px; }

/* Params */
.params-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.param-row {
  display: grid; grid-template-columns: 130px 1fr 40px; gap: 6px; align-items: center;
}
.param-row label { font-size: 12px; color: #c9d1d9; font-weight: 500; }
.param-row input, .param-row select {
  padding: 7px 9px; background: #0d1117; border: 1px solid #30363d;
  border-radius: 6px; color: #e6edf3; font-size: 13px; outline: none;
  font-family: 'SF Mono', monospace;
}
.param-row input:focus, .param-row select:focus { border-color: #58a6ff; }
.param-hint { font-size: 10px; color: #d29922; }

/* Action bar */
.action-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding-top: 10px; border-top: 1px solid #21262d;
}
.action-bar .hint { font-size: 12px; color: #8b949e; }

/* Result tabs */
.result-area { margin-top: 16px; display: none; }
.result-area.show { display: block; }
.result-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.result-tab {
  padding: 6px 14px; border: 1px solid #30363d; border-radius: 6px 6px 0 0;
  background: #0d1117; color: #8b949e; font-size: 12px; cursor: pointer;
  font-weight: 500; border-bottom: none;
}
.result-tab.active { background: #161b22; color: #e6edf3; }
.result-panel { display: none; }
.result-panel.active { display: block; }
.result-panel pre {
  background: #0d1117; border: 1px solid #30363d; border-radius: 0 6px 6px 6px;
  padding: 14px; font-size: 13px; line-height: 1.5; overflow-x: auto;
  font-family: 'SF Mono', monospace; white-space: pre-wrap; word-break: break-word;
  max-height: 500px; overflow-y: auto;
}
.meta-line { color: #8b949e; font-size: 12px; }

/* Movie detail card */
.movie-card {
  display: flex; gap: 20px; padding: 16px; background: #0d1117;
  border: 1px solid #30363d; border-radius: 10px; margin-bottom: 16px;
}
.movie-card-cover { width: 140px; flex-shrink: 0; }
.movie-card-cover img { width: 100%; border-radius: 6px; }
.movie-card-info { flex: 1; min-width: 0; }
.movie-card-info h2 { font-size: 20px; margin-bottom: 4px; }
.movie-card-info .number { color: #58a6ff; font-weight: 600; font-family: 'SF Mono', monospace; font-size: 14px; }
.movie-meta-grid {
  display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin: 8px 0; font-size: 13px;
}
.movie-meta-grid dt { color: #8b949e; }
.movie-meta-grid dd { color: #c9d1d9; }
.tag {
  display: inline-block; background: #1f6feb22; color: #58a6ff;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; border: 1px solid #1f6feb44; margin: 1px;
}
.actor-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: #21262d; padding: 3px 9px; border-radius: 6px; font-size: 12px; margin: 1px;
}
.actor-chip img { width: 18px; height: 18px; border-radius: 50%; }

/* Image gallery */
.gallery-section { margin-bottom: 16px; }
.gallery-section h3 { font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.gallery {
  display: flex; gap: 10px; overflow-x: auto; padding: 4px 0;
  scrollbar-width: thin; scrollbar-color: #30363d transparent;
}
.gallery img {
  height: 140px; border-radius: 6px; border: 1px solid #30363d;
  flex-shrink: 0; cursor: pointer; transition: transform .2s;
}
.gallery img:hover { transform: scale(1.04); border-color: #58a6ff; }

/* Ranking table */
.rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rank-table th {
  text-align: left; padding: 7px 10px; border-bottom: 1px solid #30363d;
  color: #8b949e; font-weight: 600; font-size: 11px;
}
.rank-table td { padding: 7px 10px; border-bottom: 1px solid #21262d; }
.rank-table tr:hover td { background: #1c2128; }
.rank-num { font-weight: 700; width: 35px; color: #58a6ff; }
.rank-cover { width: 40px; }
.rank-cover img { width: 40px; height: 56px; object-fit: cover; border-radius: 4px; }
.rank-title { font-weight: 500; }
.rank-meta { font-size: 11px; color: #8b949e; display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
.rank-score { color: #d29922; }
.gen-banner {
  display: inline-flex; align-items: center; gap: 6px;
  background: #1f6feb22; border: 1px solid #1f6feb44; border-radius: 6px;
  padding: 5px 12px; font-size: 12px; color: #58a6ff; margin-bottom: 10px;
}

/* Review cards */
.review-section { margin-top: 16px; }
.review-section h3 { font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.review-item {
  padding: 12px 0; border-bottom: 1px solid #21262d;
}
.review-item:last-child { border-bottom: none; }
.review-user { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.review-avatar { width: 28px; height: 28px; border-radius: 50%; background: #21262d; }
.review-name { font-size: 13px; font-weight: 500; }
.review-meta { font-size: 11px; color: #8b949e; }
.review-content { font-size: 14px; line-height: 1.6; color: #c9d1d9; margin-bottom: 4px; word-break: break-word; }
.review-likes { font-size: 11px; color: #8b949e; display: flex; align-items: center; gap: 4px; }

/* Magnet list */
.magnet-item {
  padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 13px;
}
.magnet-item:last-child { border-bottom: none; }
.magnet-name { font-weight: 500; }
.magnet-meta { font-size: 11px; color: #8b949e; display: flex; gap: 8px; margin-top: 2px; }

/* Movie grid (for lists) */
.movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.movie-grid-item { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; cursor: default; }
.movie-grid-item img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
.movie-grid-item .mg-info { padding: 8px; }
.movie-grid-item .mg-number { font-size: 12px; font-weight: 600; color: #58a6ff; }
.movie-grid-item .mg-title { font-size: 11px; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.movie-grid-item .mg-meta { font-size: 10px; color: #8b949e; margin-top: 2px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #21262d; color: #e6edf3; padding: 10px 20px; border-radius: 8px;
  border: 1px solid #30363d; font-size: 13px; z-index: 1000;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Misc */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.text-muted { color: #8b949e; }
.text-sm { font-size: 12px; }
.mt-8 { margin-top: 8px; }
.mb-8 { margin-bottom: 8px; }
.flex { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.json-key { color: #79c0ff; }
.json-str { color: #a5d6ff; }
.json-num { color: #79c0ff; }
.json-bool { color: #d2a8ff; }
.json-null { color: #8b949e; }

@media (max-width: 960px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; min-width: auto; height: auto; position: static; border-right: none; border-bottom: 1px solid #30363d; max-height: 260px; }
  .main { max-height: none; padding: 16px; }
  .login-bar input { width: 100%; }
  .param-row { grid-template-columns: 1fr; }
  .movie-card { flex-direction: column; align-items: center; }
  .movie-card-cover { width: 100px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>JavDB API Explorer</h1>
      <p>GET 端点测试 · 含可视化渲染</p>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">🎬 影片发现</div>
      <ul class="endpoint-list" id="discoverList"></ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">📄 影片详情</div>
      <ul class="endpoint-list" id="detailList"></ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">🔍 探索</div>
      <ul class="endpoint-list" id="exploreList"></ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">👤 个人中心</div>
      <ul class="endpoint-list" id="accountList"></ul>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="login-bar" id="loginBar">
      <span class="label">JavDB 登录</span>
      <input type="text" id="loginUser" placeholder="用户名" autocomplete="username">
      <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
      <button class="btn btn-primary" id="loginBtn">登录</button>
      <button class="btn btn-danger" id="logoutBtn" style="display:none">退出</button>
      <span class="status" id="loginStatus"><span style="color:#8b949e">未登录（仅公有端点可用）</span></span>
    </div>

    <div id="endpointDetail" class="endpoint-detail active">
      <div class="detail-card">
        <div class="detail-header">
          <div>
            <div class="detail-path" id="detailPath">选择一个端点</div>
            <div class="detail-title" id="detailTitle"></div>
          </div>
        </div>
        <div class="detail-body">
          <p id="detailDesc" class="text-muted" style="font-size:13px;margin-bottom:14px"></p>
          <div id="paramsArea">
            <div class="params-grid" id="paramsGrid"></div>
          </div>
          <div class="action-bar">
            <button class="btn btn-primary" id="sendBtn">发送请求</button>
            <span class="hint" id="sendHint"></span>
          </div>
          <div class="result-area" id="resultArea">
            <div class="result-tabs">
              <div class="result-tab active" data-tab="response">响应</div>
              <div class="result-tab" data-tab="request">请求</div>
              <div class="result-tab" data-tab="raw">原始 JSON</div>
            </div>
            <div class="result-panel active" id="panelResponse"></div>
            <div class="result-panel" id="panelRequest"></div>
            <div class="result-panel" id="panelRaw"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function $(s){return document.querySelector(s);}
function $$(s){return document.querySelectorAll(s);}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function jh(s){return esc(s).replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:').replace(/: "([^"]+)"/g,': <span class="json-str">"$1"</span>').replace(/: (\d+\.?\d*)/g,': <span class="json-num">$1</span>').replace(/: (true|false)/g,': <span class="json-bool">$1</span>').replace(/: null/g,'<span class="json-null">null</span>');}

function navigateToMovieDetail(mid){
  if(!mid) return;
  const curEp=state.currentEndpoint;
  if(curEp){
    state.historyBefore={endpoint:curEp,params:{}};
    const ep=EPS[curEp];
    if(ep) ep.params.forEach(p=>{
      const inp=document.querySelector(`[data-k="${p.k}"]`);
      if(inp) state.historyBefore.params[p.k]=inp.value;
    });
  }
  selectEp('movieDetail');
  const inp=document.querySelector('[data-k="id"]');
  if(inp){ inp.value=mid; sendReq(); }
}
function historyBack(){
  if(!state.historyBefore.endpoint) return;
  selectEp(state.historyBefore.endpoint);
  Object.entries(state.historyBefore.params).forEach(([k,v])=>{
    const inp=document.querySelector(`[data-k="${k}"]`);
    if(inp) inp.value=v;
  });
  state.historyBefore={endpoint:null,params:{}};
  sendReq();
}

function renderSidebar(){
  function item(id){
    const ep=EPS[id];
    const b=ep.needsAuth?'<span class="badge auth">Auth</span>':'<span class="badge pub">Public</span>';
    return `<li><button class="endpoint-btn" data-ep="${id}" onclick="selectEp('${id}')">
      <span class="method get">GET</span><span class="path">${ep.path}</span>${b}
      <span class="desc">${ep.label}</span>
    </button></li>`;
  }
  $('#discoverList').innerHTML=DISCOVER_ORDER.map(item).join('');
  $('#detailList').innerHTML=DETAIL_ORDER.map(item).join('');
  $('#exploreList').innerHTML=EXPLORE_ORDER.map(item).join('');
  $('#accountList').innerHTML=ACCOUNT_ORDER.map(item).join('');
}

// ============================================================
// Select endpoint
// ============================================================
function selectEp(id){
  const ep=EPS[id]; if(!ep) return;
  state.currentEndpoint=id;
  $$('.endpoint-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.endpoint-btn[data-ep="${id}"]`)?.classList.add('active');
  $('#detailPath').textContent=`GET ${ep.path}`;
  $('#detailTitle').textContent=ep.label;
  $('#detailDesc').textContent=ep.desc;
  const grid=$('#paramsGrid'); grid.innerHTML='';
  if(!ep.params.length) grid.innerHTML='<p class="text-muted text-sm" style="padding:4px 0">无需参数</p>';
  else ep.params.forEach(p=>{
    const r=document.createElement('div'); r.className='param-row';
    const v=p.d!==undefined?p.d:'';
    let inp;
    if(p.t==='select'){
      inp=`<select data-k="${p.k}">${(p.o||[]).map(o=>`<option value="${o.v}"${String(o.v)===String(v)?' selected':''}>${o.l}</option>`).join('')}</select>`;
    }else if(p.t==='number'){
      inp=`<input type="number" data-k="${p.k}" value="${v}" ${p.ph?'placeholder="'+esc(p.ph)+'"':''}>`;
    }else{
      inp=`<input type="text" data-k="${p.k}" value="${esc(v)}" ${p.ph?'placeholder="'+esc(p.ph)+'"':''}>`;
    }
    const note=p.pathVar?' <span class="param-hint">(路径参数)</span>':'';
    r.innerHTML=`<label>${esc(p.l)}${note}</label>${inp}<div></div>`;
    grid.appendChild(r);
  });
  $('#sendHint').textContent=ep.needsAuth?(state.token?'已登录':'需要登录'):'无需登录';
  $('#resultArea').classList.remove('show');
}

// ============================================================
// Build request
// ============================================================
function buildReq(){
  const ep=EPS[state.currentEndpoint]; if(!ep) return null;
  let path=ep.path; const params={};
  ep.params.forEach(p=>{
    const inp=document.querySelector(`[data-k="${p.k}"]`); if(!inp) return;
    let v=inp.value;
    if(p.pathVar){path=path.replace('{id}',encodeURIComponent(v));return;}
    if(v!==''&&v!==undefined&&v!==null) params[p.k]=v;
  });
  const qs=Object.keys(params).length?'?'+new URLSearchParams(params).toString():'';
  return {url:`${BASE}${path}${qs}`,path,params,headers:getHeaders(state.token)};
}

// ============================================================
// Send
// ============================================================
async function sendReq(){
  const req=buildReq(); if(!req) return;
  const ep=EPS[state.currentEndpoint];
  if(ep.needsAuth&&!state.token){toast('此端点需要登录');return;}
  $('#sendBtn').disabled=true;
  $('#sendBtn').innerHTML='<span class="spinner"></span> 请求中...';
  try{
    const start=performance.now();
    const resp=await fetch(req.url,{method:'GET',headers:req.headers});
    const elapsed=(performance.now()-start).toFixed(0);
    const raw=await resp.text();
    let data; try{data=JSON.parse(raw);}catch{data=null;}

    // Response — route to appropriate renderer
    const panelResp=$('#panelResponse');
    if(ep.id==='movieDetail'&&data?.data?.movie){
      panelResp.innerHTML=renderMovieDetail(data,raw,resp,elapsed);
    }else if(ep.id==='moviesTop'&&data?.data?.movies){
      panelResp.innerHTML=renderRankingTable(data,'排行榜');
    }else if(ep.id==='rankings'&&data?.data?.movies){
      const p=req.params; panelResp.innerHTML=renderRankingTable(data,`${p.type===undefined?'有码':['有码','无码','欧美','FC2'][parseInt(p.type)]||''} · ${p.period||'每月'}`);
    }else if((ep.id==='rankingsPlayback'||ep.id==='moviesLatest')&&data?.data?.movies){
      panelResp.innerHTML=renderMovieGrid(data);
    }else if(ep.id==='movieMagnets'&&data?.data?.magnets){
      panelResp.innerHTML=renderMagnets(data);
    }else if(ep.id==='movieReviewsPublic'&&data?.data?.reviews){
      panelResp.innerHTML=renderReviews(data.data.reviews,data.data);
    }else if(ep.id==='reviewsHotly'&&data?.data?.reviews){
      panelResp.innerHTML=renderReviews(data.data.reviews,data.data);
    }else if((ep.id==='search'||ep.id==='moviesRecommend')&&data?.data?.movies){
      panelResp.innerHTML=renderMovieGrid(data);
    }else if(Array.isArray(data?.data?.movies)){
      panelResp.innerHTML=renderMovieGrid(data);
    }else{
      panelResp.innerHTML=renderGeneric(data,raw,resp,elapsed);
    }

    // Request tab
    $('#panelRequest').innerHTML=`
      <div class="meta-line">HTTP ${resp.status} · ${elapsed}ms</div>
      <pre style="margin-top:8px">GET ${req.path}${Object.keys(req.params).length?'\n'+JSON.stringify(req.params,null,2):''}</pre>
      <pre style="margin-top:4px">Headers:\n${Object.entries(req.headers).map(([k,v])=>`  ${k}: ${v}`).join('\n')}</pre>`;
    // Raw tab
    $('#panelRaw').innerHTML=`<pre>${jh(raw)}</pre>`;
    $('#resultArea').classList.add('show');
    $$('.result-tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.result-tab[data-tab="response"]').classList.add('active');
    $$('.result-panel').forEach(p=>p.classList.remove('active'));
    $('#panelResponse').classList.add('active');
  }catch(err){toast('请求失败: '+err.message);$('#panelResponse').innerHTML=`<p style="color:#f85149;font-size:13px">请求失败: ${err.message}</p>`;$('#resultArea').classList.add('show');}
  finally{$('#sendBtn').disabled=false;$('#sendBtn').innerHTML='发送请求';}
}

// ============================================================
// Movie Detail renderer (visual: card + gallery + reviews)
// ============================================================
function renderMovieDetail(data,raw,resp,elapsed){
  const m=data.data.movie;
  let html='';
  // Back button (if history exists)
  if(state.historyBefore.endpoint){
    html+='<div style="margin-bottom:12px"><button class="btn btn-secondary btn-sm" onclick="historyBack()">← 返回</button></div>';
  }
  // Movie card
  const cover=m.cover_url||m.thumb_url||'';
  html+=`<div class="movie-card">
    <div class="movie-card-cover"><img src="${cover}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22140%22 height=%22196%22><rect fill=%22%23333%22 width=%22140%22 height=%22196%22/><text x=%2270%22 y=%2298%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2212%22>无图</text></svg>'"></div>
    <div class="movie-card-info">
      <div class="number">${esc(m.number||'')}</div>
      <h2>${esc(m.title||m.origin_title||'')}</h2>
      <dl class="movie-meta-grid">
        ${m.score?`<dt>评分</dt><dd><span class="rank-score">★ ${m.score}</span></dd>`:''}
        ${m.duration?`<dt>时长</dt><dd>${m.duration} 分钟</dd>`:''}
        ${m.release_date?`<dt>发行</dt><dd>${m.release_date}</dd>`:''}
        ${m.maker_name?`<dt>片商</dt><dd>${esc(m.maker_name)}</dd>`:''}
        ${m.series_name?`<dt>系列</dt><dd>${esc(m.series_name)}</dd>`:''}
        ${m.reviews_count!==undefined?`<dt>评价数</dt><dd>${m.reviews_count}</dd>`:''}
        ${m.want_watch_count!==undefined?`<dt>想看</dt><dd>${m.want_watch_count}</dd>`:''}
        ${m.watched_count!==undefined?`<dt>看过</dt><dd>${m.watched_count}</dd>`:''}
        ${m.magnets_count!==undefined?`<dt>磁链</dt><dd>${m.magnets_count}</dd>`:''}
      </dl>
      ${m.tags?.length?`<div class="flex mb-8">${m.tags.map(t=>`<span class="tag">${esc(t.name)}</span>`).join('')}</div>`:''}
      ${m.actors?.length?`<div class="flex mb-8">${m.actors.map(a=>`<span class="actor-chip">${a.avatar_url?`<img src="${a.avatar_url}" onerror="this.style.display='none'">`:''}${esc(a.name)}</span>`).join('')}</div>`:''}
      <div class="flex text-sm" style="color:#8b949e">
        ${m.can_play?'<span style="color:#3fb950">✓ 可在线播放</span>':''}
        ${m.has_cnsub?'<span style="color:#d29922">中字</span>':''}
        ${m.has_preview_video?'<span style="color:#58a6ff">预览视频</span>':''}
        ${m.play_subtitle?`<span>字幕: ${m.play_subtitle}</span>`:''}
      </div>
    </div>
  </div>`;

  // Preview images gallery
  const imgs=m.preview_images||[];
  if(imgs.length){
    function normUrl(u){if(!u)return '';const r=String(u).trim().replace(/^http:/i,'https:');try{const p=new URL(r),si=p.pathname.indexOf('/samples/');if(si!==-1){const pa=p.pathname.slice(si).replace(/_([sl])_(\d+\.(?:jpg|jpeg|png|webp))$/i,'_l_$2');return `https://c0.jdbstatic.com${pa}`;}}catch(e){}return r.replace(/_([sl])_(\d+\.(?:jpg|jpeg|png|webp)(?:[?#].*)?)$/i,'_l_$2');}
    html+=`<div class="gallery-section">
      <h3>🖼️ 剧照 <span class="text-muted" style="font-weight:400;font-size:13px">共 ${imgs.length} 张</span></h3>
      <div class="gallery">`;
    imgs.forEach(img=>{
      const url=normUrl(img.large_url||img.thumb_url||'');
      if(url) html+=`<img src="${url}" onclick="window.open(this.src)">`;
    });
    html+=`</div></div>`;
  }

  // Preview video
  if(m.preview_video_url){
    html+=`<div class="gallery-section">
      <h3>🎬 预览视频</h3>
      <pre style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;font-size:12px;overflow-x:auto">${esc(m.preview_video_url)}</pre>
    </div>`;
  }

  // Review snippet from movie detail
  if(m.review){
    html+=`<div class="review-section">
      <h3>💬 用户短评</h3>
      <div class="review-item">
        <div class="review-user">
          <span class="review-name">${esc(m.review.username||'用户')}</span>
          <span class="review-meta">${m.review.score?`★ ${m.review.score}`:''} · ${fmtDate(m.review.created_at)}</span>
        </div>
        <div class="review-content">${esc(m.review.content||'')}</div>
        <div class="review-likes">👍 ${m.review.likes_count||0}</div>
      </div>
    </div>`;
  }

  // Auto-fetch public reviews
  if(data?.data?.movie?.id){
    html+=`<div class="review-section" id="autoReviews"><h3>💬 加载短评中...</h3><div class="flex" style="justify-content:center;padding:16px"><span class="spinner"></span></div></div>`;
    html+=`<div class="review-section" id="autoMagnets"><h3>🔗 加载磁链中...</h3><div class="flex" style="justify-content:center;padding:16px"><span class="spinner"></span></div></div>`;
    setTimeout(()=>fetchPublicReviews(m.id),50);
    setTimeout(()=>fetchPublicMagnets(m.id),100);
  }

  return html;
}

async function fetchPublicReviews(movieId){
  if(!movieId) return;
  try{
    const url=`${BASE}/api/v1/movies/${movieId}/reviews`;
    const resp=await fetch(url,{method:'GET',headers:getHeaders()});
    const raw=await resp.text();
    let data; try{data=JSON.parse(raw);}catch{data=null;}
    const el=$('#autoReviews');
    if(!el) return;
    const reviews=data?.data?.reviews||[];
    if(!reviews.length){
      el.innerHTML='<h3>💬 公开短评</h3><p class="text-muted text-sm">暂无短评</p>';
      return;
    }
    const sorted=[...reviews].sort((a,b)=>(b.likes_count||0)-(a.likes_count||0));
    el.innerHTML=`<h3>💬 公开短评（${reviews.length} 条）</h3>${sorted.map(r=>`<div class="review-item">
      <div class="review-user"><span class="review-name">${esc(r.username||'匿名')}</span><span class="review-meta">${r.score?'★ '+r.score:''}${r.score&&r.created_at?' · ':''}${fmtDate(r.created_at)}</span></div>
      <div class="review-content">${esc(r.content||'')}</div>
      <div class="review-likes">👍 ${r.likes_count||0}</div>
    </div>`).join('')}`;
  }catch(e){const el=$('#autoReviews');if(el)el.innerHTML='<h3>💬 公开短评</h3><p class="text-muted text-sm">加载失败</p>';}
}

async function fetchPublicMagnets(movieId){
  if(!movieId) return;
  try{
    const url=`${BASE}/api/v1/movies/${movieId}/magnets`;
    const resp=await fetch(url,{method:'GET',headers:getHeaders()});
    const raw=await resp.text();
    let data; try{data=JSON.parse(raw);}catch{data=null;}
    const el=$('#autoMagnets');
    if(!el) return;
    const ms=data?.data?.magnets||[];
    if(!ms.length){
      el.innerHTML='<h3>🔗 磁链</h3><p class="text-muted text-sm">暂无磁链</p>';
      return;
    }
    el.innerHTML='<h3>🔗 磁链（'+ms.length+' 条）</h3>'+ms.map(m=>'<div class="magnet-item"><div class="magnet-name">'+esc(m.name||'')+'</div><div class="magnet-meta"><span>大小: '+(m.size||'-')+'</span>'+(m.hd?'<span>HD</span>':'')+(m.cnsub?'<span>中字</span>':'')+(m.files_count?'<span>'+m.files_count+'个文件</span>':'')+(m.created_at?'<span>'+fmtDate(m.created_at)+'</span>':'')+'</div></div>').join('');
  }catch(e){const el=$('#autoMagnets');if(el)el.innerHTML='<h3>🔗 磁链</h3><p class="text-muted text-sm">加载失败</p>';}
}

// ============================================================
// Ranking table renderer
// ============================================================
function renderRankingTable(data,label){
  const ms=data.data.movies||[];
  const gen=data.data.generated_at||'';
  const page=data.data.current_page||1;
  let h=gen?`<div class="gen-banner">📅 ${gen} · 第${page}页 · ${ms.length}部</div>`:'';
  h+=`<p class="text-sm text-muted mb-8">${esc(label)}</p>`;
  h+=`<table class="rank-table"><thead><tr><th>#</th><th></th><th>番号 / 标题</th><th>信息</th></tr></thead><tbody>`;
  ms.forEach((m,i)=>{
    const rk=m.ranking||(page-1)*50+i+1;
    const cv=m.cover_url||m.thumb_url||'';
    const t=m.origin_title||m.title||'';
    const meta=[];
    if(m.duration)meta.push(`${m.duration}min`);
    if(m.release_date)meta.push(m.release_date);
    if(m.score)meta.push(`<span class="rank-score">★ ${m.score}</span>`);
    if(m.magnets_count)meta.push(`🔗${m.magnets_count}`);
    const bd=[];
    if(m.can_play)bd.push('▶');if(m.has_cnsub)bd.push('中字');if(m.has_preview_video)bd.push('预告');
    h+=`<tr style="cursor:pointer" onclick="navigateToMovieDetail('${esc(m.id||'')}')"><td class="rank-num">${rk}</td>
      <td class="rank-cover">${cv?`<img src="${cv}" onerror="this.style.display='none'">`:''}</td>
      <td><div class="rank-title">${esc(m.number||'')}${bd.length?' '+bd.map(b=>`<span style="font-size:10px;background:#1f6feb22;color:#58a6ff;padding:1px5px;border-radius:3px">${b}</span>`).join(''):''}</div><div class="rank-meta">${esc(t)}</div></td>
      <td><div class="rank-meta">${meta.join(' · ')}</div></td></tr>`;
  });
  h+='</tbody></table>';
  return h;
}

          ${mid?`<code style="font-size:11px;color:#8b949e;background:#21262d;padding:2px 6px;border-radius:4px">ID: ${esc(mid)}</code>`:''}

          <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();navigateToMovieDetail('${esc(mid)}')" style="padding:2px 8px;font-size:11px">🔍 查看详情</button>
        </div>
        <div style="font-size:12px;color:#8b949e;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.title||m.origin_title||'')}</div>

function renderMagnets(data){

// ============================================================
// Reviews renderer
// ============================================================
function renderReviews(revs,meta){
  if(!revs||!revs.length) return '<p class="text-muted text-sm">暂无短评</p>';
  const total=meta?.pagination?.total||revs.length;
  const sorted=[...revs].sort((a,b)=>(b.likes_count||0)-(a.likes_count||0));
  let h=`<p class="text-muted text-sm mb-8">共 ${total} 条短评 · 按点赞排序</p>`;
  sorted.forEach(r=>{
    h+=`<div class="review-item">
      <div class="review-user"><span class="review-name">${esc(r.username||'匿名')}</span>
      <span class="review-meta">${r.score?'★ '+r.score:''}${r.score&&r.created_at?' · ':''}${fmtDate(r.created_at)}</span></div>
      <div class="review-content">${esc(r.content||'')}</div>
      <div class="review-likes">👍 ${r.likes_count||0}</div>
    </div>`;
  });
  return h;
}

// ============================================================
// Generic response
// ============================================================
function renderGeneric(data,raw,resp,elapsed){
  const sc=resp.ok?'#3fb950':'#f85149';
  let h=`<div class="meta-line" style="margin-bottom:8px">HTTP <span style="color:${sc};font-weight:600">${resp.status}</span> · ${elapsed}ms</div>`;
  if(data?.error){
    h+=`<div style="background:#da363322;border:1px solid #da363344;border-radius:6px;padding:12px;margin-bottom:8px">
      <strong style="color:#f85149">${esc(data.error)}</strong>
      ${data.message?`<p style="color:#c9d1d9;font-size:13px;margin-top:4px">${esc(data.message)}</p>`:''}</div>`;
  }
  h+=`<pre>${jh(raw)}</pre>`;
  return h;
}

function fmtDate(d){if(!d)return '';try{const n=new Date(d),t=new Date(),di=t-n;if(di<6e4)return '刚刚';if(di<36e5)return Math.floor(di/6e4)+'分钟前';if(di<864e5)return Math.floor(di/36e5)+'小时前';if(di<2592e6)return Math.floor(di/864e5)+'天前';return n.toLocaleDateString('zh-CN');}catch{return d;}}

// Result tabs
// ============================================================
$$('.result-tab').forEach(t=>t.addEventListener('click',()=>{
  const tg=t.dataset.tab;
  $$('.result-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  $$('.result-panel').forEach(p=>p.classList.remove('active'));
  const m={response:'Response',request:'Request',raw:'Raw'};
  $(`#panel${m[tg]}`).classList.add('active');
}));

// ============================================================
// Login
// ============================================================
$('#loginBtn').onclick=async()=>{
  const u=$('#loginUser').value.trim(),p=$('#loginPass').value;
  if(!u||!p){toast('请输入用户名和密码');return;}
  $('#loginBtn').disabled=true;$('#loginBtn').innerHTML='<span class="spinner"></span>';
  $('#loginStatus').innerHTML='登录中...';
  try{
    const url=`${BASE}/api/v1/sessions`;
    const params=new URLSearchParams({username:u,password:p,device_uuid:'04b9534d-5118-53de-9f87-2ddded77111e',device_name:'Chrome',device_model:'Browser',platform:'web',system_version:'1.0',app_version:'official',app_version_number:'1.9.29',app_channel:'official'});
    const resp=await fetch(`${url}?${params}`,{method:'POST',headers:getHeaders()});
    const raw=await resp.text();
    let d;try{d=JSON.parse(raw);}catch{d=null;}
    if(!resp.ok||!d?.data?.token){
      $('#loginStatus').innerHTML=`<span style="color:#f85149">登录失败${d?.error?': '+d.error:''}</span>`;
      toast('登录失败');return;
    }
    state.token=d.data.token;
    $('#loginStatus').innerHTML=`<span style="color:#3fb950">已登录 (${esc(u)}) ✓</span>`;
    $('#loginBtn').style.display='none';
    $('#logoutBtn').style.display='inline-flex';
    $('#loginUser').disabled=true;$('#loginPass').disabled=true;
    toast('登录成功');
    if(state.currentEndpoint){const ep=EPS[state.currentEndpoint];$('#sendHint').textContent=ep.needsAuth?'已登录':'无需登录';}
  }catch(err){$('#loginStatus').innerHTML='<span style="color:#f85149">网络错误</span>';toast('网络请求失败');}
  finally{$('#loginBtn').disabled=false;$('#loginBtn').innerHTML='登录';}
};
$('#logoutBtn').onclick=()=>{
  state.token=null;
  $('#loginStatus').innerHTML='<span style="color:#8b949e">未登录（仅公有端点可用）</span>';
  $('#loginBtn').style.display='inline-flex';$('#logoutBtn').style.display='none';
  $('#loginUser').disabled=false;$('#loginUser').value='';$('#loginPass').disabled=false;$('#loginPass').value='';
  toast('已退出');
  if(state.currentEndpoint){const ep=EPS[state.currentEndpoint];$('#sendHint').textContent=ep.needsAuth?'需要登录':'无需登录';}
};
$('#sendBtn').onclick=sendReq;
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.closest('.param-row,.login-bar')){if(e.target.closest('.login-bar')){$('#loginBtn').click();return;}sendReq();}});

// Init
renderSidebar();
selectEp('search'); // Open movie detail as default (most visual)
</script>

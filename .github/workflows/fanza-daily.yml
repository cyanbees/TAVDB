name: 更新 FANZA 日榜
on:
  schedule:
    - cron: '0 6 * * *'   # 每天凌晨6点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: 安装依赖 + Playwright
        run: |
          npm init -y
          npm install playwright
      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium
      - name: 爬取 FANZA 日榜
        run: node scripts/fanza-monthly.js
        env:
          TERM: daily
          JAVDB_USER: ${{ secrets.JAVDB_USER }}
          JAVDB_PASS: ${{ secrets.JAVDB_PASS }}
          DMM_USER: ${{ secrets.DMM_USER }}
          DMM_PASS: ${{ secrets.DMM_PASS }}
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fanza-daily.json
          git diff --staged --quiet || git commit -m "自动更新 FANZA 日榜 $(date -u +%Y-%m-%d)"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push

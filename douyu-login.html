<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>斗鱼扫码登录 - 获取 Cookie</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(135deg, #fe8c00, #f83600);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  width: 420px;
  max-width: 92vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  text-align: center;
}
h1 { font-size: 22px; color: #333; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #999; margin-bottom: 20px; }

.qr-box {
  width: 220px; height: 220px;
  margin: 0 auto 16px;
  border: 2px solid #eee;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.qr-box canvas, .qr-box img { max-width: 200px; max-height: 200px; border-radius: 6px; }
.qr-box .placeholder {
  color: #999; font-size: 14px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.qr-box .placeholder .spinner {
  width: 36px; height: 36px;
  border: 3px solid #f3f3f3;
  border-top: 3px solid #f83600;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status { font-size: 14px; color: #666; margin: 10px 0; min-height: 22px; transition: color .3s; }
.status.ok { color: #52c41a; }
.status.err { color: #f5222d; }
.status.warn { color: #faad14; }

.qr-expired {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.qr-expired.show { display: flex; }
.qr-expired .reload-btn {
  background: #f83600; color: #fff; border: none;
  padding: 8px 24px; border-radius: 20px; font-size: 14px; cursor: pointer;
}
.qr-expired .reload-btn:hover { background: #d62f00; }
.qr-expired .reload-btn:disabled { opacity: .5; cursor: not-allowed; }

/* Cookie result */
.cookie-section { display: none; margin-top: 16px; text-align: left; }
.cookie-section.show { display: block; }
.cookie-section label { font-size: 13px; color: #666; font-weight: 600; display: block; margin-bottom: 6px; }
.cookie-box {
  background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 8px;
  padding: 12px; font-size: 12px; color: #333; word-break: break-all;
  max-height: 160px; overflow-y: auto;
  font-family: "SF Mono", "Menlo", "Consolas", monospace; line-height: 1.7;
  user-select: all;
}
.copy-btn {
  margin-top: 8px; background: #1890ff; color: #fff; border: none;
  padding: 8px 24px; border-radius: 20px; font-size: 14px; cursor: pointer;
  width: 100%; transition: background .2s;
}
.copy-btn:hover { background: #096dd9; }
.copy-btn.done { background: #52c41a; }

.steps { font-size: 12px; color: #bbb; margin-top: 16px; line-height: 1.8; }
.steps span { color: #f83600; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <h1>🔑 斗鱼扫码登录</h1>
  <p class="subtitle">获取 Cookie 后粘贴到斗鱼模块设置中使用</p>

  <div class="qr-box" id="qrBox">
    <div class="placeholder" id="qrPlaceholder">
      <div class="spinner"></div>
      <span>正在获取二维码…</span>
    </div>
    <div class="qr-expired" id="qrExpired">
      <span>⏰ 二维码已过期</span>
      <button class="reload-btn" id="reloadBtn">重新获取</button>
    </div>
  </div>

  <div class="status" id="statusEl">打开斗鱼 APP 扫码</div>

  <div class="cookie-section" id="cookieSection">
    <label>✅ 登录成功！复制以下 Cookie：</label>
    <div class="cookie-box" id="cookieBox"></div>
    <button class="copy-btn" id="copyBtn">📋 复制 Cookie</button>
  </div>

  <div class="steps">
    <div>① 点击「获取二维码」</div>
    <div>② 打开斗鱼 APP「扫一扫」扫描</div>
    <div>③ 在手机上确认登录</div>
    <div style="margin-top:6px;color:#999;">Cookie 有效期约 <span>7 天</span></div>
  </div>
</div>

<script>
(function() {
  // ---- API 地址（通过本地代理服务器，避免 CORS） ----
  var API_BASE = 'http://' + location.host;

  // ---- 生成设备 ID ----
  function generateDid() {
    var hex = '0123456789abcdef';
    var did = '';
    for (var i = 0; i < 32; i++) did += hex[Math.floor(Math.random() * 16)];
    return did;
  }

  // ---- DOM ----
  var qrBox = document.getElementById('qrBox');
  var qrPlaceholder = document.getElementById('qrPlaceholder');
  var qrExpired = document.getElementById('qrExpired');
  var reloadBtn = document.getElementById('reloadBtn');
  var statusEl = document.getElementById('statusEl');
  var cookieSection = document.getElementById('cookieSection');
  var cookieBox = document.getElementById('cookieBox');
  var copyBtn = document.getElementById('copyBtn');

  var pollingTimer = null;
  var expireTimer = null;
  var currentCode = '';
  var currentQrUrl = '';

  // ---- Cookie 工具 ----
  function readCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : '';
  }

  function getAllCookies() {
    var cookies = [];
    // 从 document.cookie 读取
    var raw = document.cookie;
    if (raw) {
      var parts = raw.split(';');
      for (var i = 0; i < parts.length; i++) {
        var c = parts[i].trim();
        if (c) cookies.push(c);
      }
    }
    return cookies;
  }

  // ---- UI ----
  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  function showQrCode(qrDataUrl) {
    // 显示二维码图片
    qrPlaceholder.style.display = 'none';
    qrExpired.className = 'qr-expired';
    // 用 canvas 二维码或图片
    var img = document.createElement('img');
    img.src = qrDataUrl;
    img.alt = '扫码登录';
    img.style.width = '200px';
    img.style.height = '200px';
    // 清空并添加
    var existing = qrBox.querySelector('img');
    if (existing) existing.remove();
    var existingCanvas = qrBox.querySelector('canvas');
    if (existingCanvas) existingCanvas.remove();
    qrBox.appendChild(img);
  }

  function showQrExpired() {
    qrPlaceholder.style.display = 'none';
    qrExpired.className = 'qr-expired show';
    var img = qrBox.querySelector('img');
    if (img) img.remove();
    var canvas = qrBox.querySelector('canvas');
    if (canvas) canvas.remove();
    setStatus('二维码已过期', 'err');
  }

  function showSuccess() {
    // 显示 ✓
    qrPlaceholder.style.display = 'none';
    qrExpired.className = 'qr-expired';
    var img = qrBox.querySelector('img');
    if (img) { img.style.display = 'none'; }
    // 加一个勾
    var check = document.createElement('div');
    check.textContent = '✅';
    check.style.fontSize = '64px';
    qrBox.appendChild(check);
  }

  // ---- 生成 QR 码的简单实现 ----
  // 由于不能依赖第三方库，直接用 API 返回的 URL 生成二维码
  // 用内联的 qrcode.js 迷你实现
  function generateQR(text, callback) {
    // 使用第三方 QR 码 API 生成图片 (简单可靠)
    var img = new Image();
    // 使用 google 或 api 服务，但我们直接用 data URL
    // 因为只有 URL 文本，用 https://api.qrserver.com/v1/create-qr-code/
    // 或者用 http://chart.apis.google.com/chart?cht=qr&chs=200x200&chl=URL
    var apiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(text);
    callback(apiUrl);
  }

  // ---- 核心流程 ----
  function startLogin() {
    // 清理旧状态
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
    if (expireTimer) { clearTimeout(expireTimer); expireTimer = null; }
    cookieSection.className = 'cookie-section';
    qrPlaceholder.style.display = 'flex';
    qrExpired.className = 'qr-expired';
    var imgs = qrBox.querySelectorAll('img, canvas, div');
    for (var i = imgs.length - 1; i >= 0; i--) {
      if (imgs[i].id !== 'qrPlaceholder' && imgs[i].id !== 'qrExpired') {
        imgs[i].remove();
      }
    }
    setStatus('正在获取二维码…');
    reloadBtn.disabled = true;

    // 1. 通过本地代理调用 generateCode API
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API_BASE + '/api/generate', true);

    xhr.onload = function() {
      reloadBtn.disabled = false;
      if (xhr.status !== 200) {
        setStatus('网络错误: ' + xhr.status + ' — 确保已启动代理服务器 (node douyu-login-server.js)', 'err');
        showQrExpired();
        return;
      }
      var resp;
      try { resp = JSON.parse(xhr.responseText); } catch(e) { resp = null; }
      if (!resp || resp.error !== 0) {
        setStatus('获取二维码失败: ' + (resp ? resp.msg : '未知错误'), 'err');
        showQrExpired();
        return;
      }
      var data = resp.data || {};
      var qrText = data.url;
      var code = data.code;
      if (!qrText || !code) {
        setStatus('二维码数据异常', 'err');
        showQrExpired();
        return;
      }

      currentCode = code;
      currentQrUrl = qrText;

      // 生成二维码图片
      var qrImgUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(qrText);
      showQrCode(qrImgUrl);
      setStatus('请使用 斗鱼 APP 扫一扫 登录');

      // 2. 开始轮询
      pollingTimer = setInterval(function() { pollCheck(code); }, 1500);

      // 3. 过期定时器
      expireTimer = setTimeout(function() {
        if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
        if (cookieSection.className.indexOf('show') < 0) {
          showQrExpired();
          setStatus('二维码已过期，点击重新获取', 'err');
        }
      }, 120000);
    };
    xhr.onerror = function() {
      reloadBtn.disabled = false;
      setStatus('网络请求失败 — 请确保已启动代理服务器 (node douyu-login-server.js)', 'err');
    };
    xhr.send();
  }

  // ---- 轮询扫码状态（通过本地代理） ----
  function pollCheck(code) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API_BASE + '/api/poll?code=' + encodeURIComponent(code), true);

    xhr.onload = function() {
      if (xhr.status !== 200) return;
      var resp;
      try { resp = JSON.parse(xhr.responseText); } catch(e) { return; }
      if (!resp) return;

      if (resp.error === 0) {
        // 登录成功！cookies 由代理服务器提取
        onLoginSuccess(resp);
      } else if (resp.error === 1) {
        setStatus('📱 已扫码，请在手机上确认登录', 'warn');
      }
      // error === -2: 等待扫码 — 继续轮询
    };
    xhr.onerror = function() {};
    xhr.send();
  }

  // ---- 登录成功处理 ----
  function onLoginSuccess(resp) {
    // 停止轮询
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
    if (expireTimer) { clearTimeout(expireTimer); expireTimer = null; }

    setStatus('✅ 登录成功！', 'ok');
    showSuccess();

    // 从代理返回的 cookies 字段提取
    var cookieStr = (resp.cookies && resp.cookies.length) ? resp.cookies.join('; ') : '';

    if (!cookieStr) {
      setStatus('登录成功但无法提取 Cookie', 'err');
      return;
    }

    cookieBox.textContent = cookieStr;
    cookieSection.className = 'cookie-section show';
  }

  // ---- 复制 ----
  copyBtn.addEventListener('click', function() {
    var text = cookieBox.textContent;
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        copyBtn.textContent = '✅ 已复制';
        copyBtn.className = 'copy-btn done';
        setTimeout(function() {
          copyBtn.textContent = '📋 复制 Cookie';
          copyBtn.className = 'copy-btn';
        }, 2000);
      }).catch(function() { fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  });

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      copyBtn.textContent = '✅ 已复制';
      copyBtn.className = 'copy-btn done';
      setTimeout(function() {
        copyBtn.textContent = '📋 复制 Cookie';
        copyBtn.className = 'copy-btn';
      }, 2000);
    } catch(e) {}
    document.body.removeChild(ta);
  }

  // ---- 重新获取 ----
  reloadBtn.addEventListener('click', startLogin);

  // ---- 自动启动 ----
  startLogin();
})();
</script>
</body>
</html>
